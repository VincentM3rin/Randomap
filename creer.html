<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="logo randomap (1).png">
    <link href="./index.css" rel="stylesheet" />
    <link href="./creer.css" rel="stylesheet" />
    <title>Rando'map</title>
</head>
<body>
    <nav>
        <br>
        <div>
            <img src="logo randomap (1).png" height="100">
            <a href="./index.html">Accueil</a>
            <a href="./carte.html">Carte des randonnées</a>
            <a href="./contact.html">Contact</a>
            <a href="./profil.html" id="nav-profil">Profil</a>
            <a href="#" id="btn-logout">Deconnexion</a>
        </div>
    </nav>
    <section class="imagefond">
        <h1></h1>
        <form id="formRando" class="form-rando">
            <label>Nom du parcours :</label>
            <input type="text" id="ville_depart" required>

            <label>Ville de départ :</label>
            <input type="text" id="ville_depart" required>
            
            <label>Nombre de kilomètres :</label>
            <input type="number" id="km" step="0.1" required>
             
            <fieldset>
                <legend>Comment est le parcous ?</legend>
                <div>
                    <input type="checkbox" id="scales" name="scales" checked />
                    <label for="scales">D'un point A à un point B</label>
                </div>

                <div>
                    <input type="checkbox" id="horns" name="horns" />
                    <label for="horns">Retour au même point</label>
                </div>
            </fieldset>

            <div id="div_arrivee">
                <label>Ville d'arrivée (Si point A à point B)</label>
                <input type="text" id="ville_arrivee">
            </div>

            <label>Image :</label>
            <input type="file" id="photoFile" accept="image/*">
            <button type="submit" class="btn-custom">Envoyez</button>
        </form>
    </section>
    
    <script src="./creer.js"></script>
    <script src="./profil.js"></script>
</body>
</html>
