		<section class="imagefond">
			<h1>Contact</h1>
			<h2>Des choses à améliorer ? Des bugs ? N'hésitez pas a remplir le formulaire !</h2>
			<form id="contactForm" action="https://formspree.io/f/mlgpznkn" method="POST">
            <ul>
                <li>
                    <label for="name">Nom:</label>
                    <input type="text" id="name" name="user_name" required>
                </li>
                <li>
                    <label for="mail">E-mail:</label>
                    <input type="email" id="mail" name="email" required>
                </li>
                <li>
                    <label for="msg">Message:</label>
                    <textarea id="msg" name="message" required></textarea>
                </li>
                <li>
                    <button type="submit" class="btn">Envoyer le message</button>
                </li>
            </ul>
        </form>
        <img src="contact.png" height="300">
		</section>
